# Redirección de HTTP a HTTPS
server {
    listen 80;
    server_name oraculo-eternia.duckdns.org;

    # Permitir renovación de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Configuración de Servidor Seguro (HTTPS)
server {
    listen 443 ssl;
    server_name oraculo-eternia.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/oraculo-eternia.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oraculo-eternia.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # ─── Security headers (Fase AAA-1.7) ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Control largo para assets con hash de Vite (Fase AAA-4.6)
    location ~* \.(?:js|css|woff2?|webp|avif|png|jpg|jpeg|svg|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # Proxy API calls to backend
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_service backend;
        proxy_pass http://$backend_service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
