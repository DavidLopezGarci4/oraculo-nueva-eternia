services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: oraculo-backend-prod
    container_name: oraculo_backend_prod
    ports:
      - "8000:8000"
    volumes:
      # Persistent data: images, Excel, logs
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    # Single-worker in production to prevent duplicate background Telegram listeners and conflicts (no --reload)
    command: uvicorn src.interfaces.api.main:app --host 0.0.0.0 --port 8000 --workers 1
    networks:
      - eternia-net-prod
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: oraculo-frontend-prod
    container_name: oraculo_frontend_prod
    ports:
      # Puertos estándar HTTP y HTTPS
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - eternia-net-prod
    restart: always

networks:
  eternia-net-prod:
    driver: bridge
